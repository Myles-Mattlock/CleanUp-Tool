name: Build and Package Multiple PowerShell Scripts and Create Release

on:
  push:
    branches:
      - dev
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  system_cleanup_build:
    name: Build System CleanUp
    runs-on: windows-2025

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install ps2exe module
      run: |
        pwsh -Command "Install-Module -Name ps2exe -Force"
      shell: pwsh

    - name: Install Visual Studio Build Tools (for mt.exe)
      run: |
        choco install visualstudio2022buildtools -y --package-parameters "--add Microsoft.Component.MSBuild --add Microsoft.Component.VC"
      shell: pwsh

    - name: Prepare Staging Directory
      run: |
        # This is the root folder that will be zipped
        New-Item -ItemType Directory -Path "Staging" -Force
        # This is the folder the installer will eventually copy to Program Files
        New-Item -ItemType Directory -Path "Staging\SystemCleanUp" -Force
      shell: pwsh

    - name: Convert Scripts to Executables
      run: |
        # 1. Build the Main App and put it INSIDE the folder
        pwsh -Command "ps2exe -InputFile CleanUp.ps1 -OutputFile 'Staging\SystemCleanUp\System CleanUp.exe' -IconFile icon.ico -version '2.0.0'"
        
        # 2. Build the Installer and put it OUTSIDE the folder
        pwsh -Command "ps2exe -InputFile installer.ps1 -OutputFile 'Staging\Setup.exe' -IconFile icon.ico -version '1.0.0'"
      shell: pwsh

    - name: Copy Registry Files
      run: |
        Copy-Item "*.reg" -Destination "Staging\SystemCleanUp\" -ErrorAction SilentlyContinue
      shell: pwsh

    - name: Embed Manifest for Admin Privileges
      run: |
        $mtPath = Get-ChildItem "C:\Program Files (x86)\Windows Kits\*\bin\*\x64\mt.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        
        # Apply manifest to the Tool
        & $mtPath -manifest elevate.manifest.xml -outputresource:"Staging\SystemCleanUp\System CleanUp.exe";#1
        
        # Apply manifest to the Installer (Crucial for C:\Program Files access)
        & $mtPath -manifest elevate.manifest.xml -outputresource:"Staging\Setup.exe";#1
      shell: pwsh

    - name: Create System CleanUp ZIP
      run: |
        # Zips the contents of Staging so Setup.exe and the folder are at the root
        Compress-Archive -Path "Staging\*" -DestinationPath "SystemCleanUp.zip"
      shell: pwsh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SystemCleanUpZIP
        path: SystemCleanUp.zip

  server_cleanup_build:
    name: Build Server CleanUp
    runs-on: windows-2025
    needs: system_cleanup_build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install ps2exe module
      run: |
        pwsh -Command "Install-Module -Name ps2exe -Force"
      shell: pwsh

    - name: Build Server EXE
      run: |
        New-Item -ItemType Directory -Path "ServerStaging" -Force
        pwsh -Command "ps2exe -InputFile CleanUpServer.ps1 -OutputFile 'ServerStaging\Server CleanUp.exe' -IconFile icon.ico -version '2.0.0'"
      shell: pwsh

    - name: Create Server ZIP
      run: |
        Compress-Archive -Path "ServerStaging\*" -DestinationPath "ServerCleanUp.zip"
      shell: pwsh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ServerCleanUpZIP
        path: ServerCleanUp.zip

  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [system_cleanup_build, server_cleanup_build]
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          SystemCleanUpZIP/SystemCleanUp.zip
          ServerCleanUpZIP/ServerCleanUp.zip
        draft: false
        prerelease: ${{ contains(github.ref_name, '-') }}