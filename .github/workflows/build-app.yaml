name: Build and Package System CleanUp

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install ps2exe
      run: pwsh -Command "Install-Module -Name ps2exe -Force"

    - name: Create Structure
      run: |
        # This is our workspace
        New-Item -ItemType Directory -Path "BuildOutput" -Force
        # This is the folder the installer will look for
        New-Item -ItemType Directory -Path "BuildOutput\SystemCleanUp" -Force

    - name: Compile Tool and Installer
      run: |
        # Compile the App INTO the subfolder
        pwsh -Command "ps2exe -InputFile CleanUp.ps1 -OutputFile 'BuildOutput\SystemCleanUp\System CleanUp.exe' -IconFile icon.ico -version '2.0.0'"
        
        # Compile the Installer OUTSIDE the subfolder
        pwsh -Command "ps2exe -InputFile installer.ps1 -OutputFile 'BuildOutput\Setup.exe' -IconFile icon.ico -version '1.0.0'"
      shell: pwsh

    - name: Copy Assets
      run: |
        Copy-Item "*.reg" -Destination "BuildOutput\SystemCleanUp\" -ErrorAction SilentlyContinue

    - name: Embed Admin Manifest
      run: |
        $mtPath = Get-ChildItem "C:\Program Files (x86)\Windows Kits\*\bin\*\x64\mt.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        # Both files need Admin to work in Program Files
        & $mtPath -manifest elevate.manifest.xml -outputresource:"BuildOutput\SystemCleanUp\System CleanUp.exe";#1
        & $mtPath -manifest elevate.manifest.xml -outputresource:"BuildOutput\Setup.exe";#1
      shell: pwsh

    - name: Zip Release
      run: |
        # Zip everything inside BuildOutput so Setup.exe is at the top level
        Compress-Archive -Path "BuildOutput\*" -DestinationPath "SystemCleanUp_Package.zip"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: SystemCleanUp-Dist
        path: SystemCleanUp_Package.zip

  create_release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download
      uses: actions/download-artifact@v4
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: SystemCleanUp-Dist/SystemCleanUp_Package.zip