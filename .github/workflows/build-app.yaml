name: Build and Package PowerShell Script

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up PowerShell
      uses: powershell/setup-powershell@v2
      with:
        powershell-version: '7.4' # Or your desired PowerShell version

    - name: Install ps2exe module
      run: |
        pwsh -Command "Install-Module -Name ps2exe -Force"
      shell: pwsh

    - name: Convert PowerShell script to executable
      run: |
        pwsh -Command "ps2exe -InputFile CleanUp.ps1 -OutputFile 'SystemCleanUp/System CleanUp.exe' -IconFile Refresh.ico -version '1.3'"
      shell: pwsh

    - name: Install Visual Studio Build Tools (Direct Download - Primary)
      run: |
        # Remove the file if it exists
        if (Test-Path "BuildTools_Full.exe") {
          Remove-Item "BuildTools_Full.exe"
        }
        try {
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?LinkId=2084274" -OutFile "BuildTools_Full.exe" -ErrorAction Stop
          Write-Host "BuildTools_Full.exe downloaded successfully."
          Start-Process -Wait -FilePath "BuildTools_Full.exe" -ArgumentList "/Quiet", "/InstallSelectableItems", "Microsoft.DesktopBuildTools" -ErrorAction Stop
          Write-Host "Build Tools installed successfully (Direct Download)."
        } catch {
          Write-Warning "Direct download of Build Tools failed: $($_.Exception.Message). Attempting installation via choco..."
          # Attempt installation via choco if direct download fails
          choco install visualstudio2022buildtools -y --package-parameters "--add Microsoft.Component.MSBuild --add Microsoft.Component.VC"
          Write-Host "Build Tools installed successfully (via choco)."
        }
      shell: pwsh

    - name: Set Environment Path (Adjust as needed based on installation)
      run: |
        $env:PATH += ";C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Tools\MSVC\*\bin\Hostx64\x64"
      shell: pwsh

    - name: Run mt.exe to embed manifest
      run: |
        $mtPath = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\mt.exe"
        if (-not (Test-Path $mtPath)) {
          $mtPath = Get-ChildItem "C:\Program Files (x86)\Windows Kits\*\bin\*\x64\mt.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 | Select-Object -ExpandProperty FullName
          if (-not $mtPath) {
            Write-Error "mt.exe not found."
            exit 1
          }
        }
        & $mtPath -manifest elevate.manifest.xml -outputresource:"SystemCleanUp\System CleanUp.exe";#1
      shell: pwsh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SystemCleanUp
        path: SystemCleanUp