name: Build and Package Multiple PowerShell Scripts

on: [push, workflow_dispatch]

jobs:
  system_cleanup_build:
    name: Build System CleanUp
    runs-on: windows-2025

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Cache PowerShell Modules
      uses: actions/cache@v4
      id: cache-psmodules
      path: ~\Documents\WindowsPowerShell\Modules
      key: ${{ runner.os }}-psmodules-${{ hashFiles('**/requirements.psd1') }} # Adjust pattern as needed

    - name: Install ps2exe module
      if: steps.cache-psmodules.outputs.cache-hit != 'true'
      run: |
        pwsh -Command "Install-Module -Name ps2exe -Force"
      shell: pwsh

    - name: Cache Build Tools
      uses: actions/cache@v4
      id: cache-buildtools
      path: C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools
      key: ${{ runner.os }}-buildtools-2022 # Consider a more dynamic key if needed

    - name: Install Visual Studio Build Tools
      if: steps.cache-buildtools.outputs.cache-hit != 'true'
      run: |
        # ... (Your existing Build Tools installation script) ...
      shell: pwsh

    - name: Set Environment Path
      run: |
        $env:PATH += ";C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Tools\MSVC\*\bin\Hostx64\x64"
      shell: pwsh

    - name: Convert PowerShell script to executable
      run: |
        pwsh -Command "ps2exe -InputFile CleanUp.ps1 -OutputFile 'SystemCleanUp/System CleanUp.exe' -IconFile Refresh.ico -version '1.3'"
      shell: pwsh

    - name: Run mt.exe to embed manifest (System CleanUp)
      run: |
        # ... (Your existing mt.exe command) ...
      shell: pwsh

    - name: Upload Artifact (System CleanUp)
      uses: actions/upload-artifact@v4
      with:
        name: SystemCleanUp
        path: SystemCleanUp

  server_cleanup_build:
    name: Build Server CleanUp
    runs-on: windows-2025
    needs: system_cleanup_build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Restore PowerShell Modules from Cache
      uses: actions/cache@v4
      id: cache-psmodules
      path: ~\Documents\WindowsPowerShell\Modules
      key: ${{ runner.os }}-psmodules-${{ hashFiles('**/requirements.psd1') }}

    - name: Restore Build Tools from Cache
      uses: actions/cache@v4
      id: cache-buildtools
      path: C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools
      key: ${{ runner.os }}-buildtools-2022

    - name: Set Environment Path
      run: |
        $env:PATH += ";C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Tools\MSVC\*\bin\Hostx64\x64"
      shell: pwsh

    - name: Convert PowerShell script to executable
      run: |
        pwsh -Command "ps2exe -InputFile CleanUp.ps1 -OutputFile 'ServerCleanUp/Server CleanUp.exe' -IconFile Refresh.ico -version '1.3'"
      shell: pwsh

    - name: Run mt.exe to embed manifest (Server CleanUp)
      run: |
        # ... (Your existing mt.exe command) ...
      shell: pwsh

    - name: Upload Artifact (Server CleanUp)
      uses: actions/upload-artifact@v4
      with:
        name: ServerCleanUp
        path: ServerCleanUp