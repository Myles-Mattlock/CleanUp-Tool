name: Build and Package CleanUp Suite

on:
  push:
    branches:
      - dev
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build_all:
    name: Build System and Server Versions
    runs-on: windows-2025

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install ps2exe
      run: pwsh -Command "Install-Module -Name ps2exe -Force"
      shell: pwsh

    - name: Install Build Tools (mt.exe)
      run: choco install visualstudio2026buildtools -y --package-parameters "--add Microsoft.Component.MSBuild --add Microsoft.Component.VC"
      shell: pwsh

    # --- SYSTEM CLEANUP BUILD ---
    - name: Prepare System Staging
      run: |
        New-Item -ItemType Directory -Path "Staging_System\SystemCleanUp" -Force
        
        # Compile Tool into the subfolder
        pwsh -Command "ps2exe -InputFile CleanUp.ps1 -OutputFile 'Staging_System\SystemCleanUp\System CleanUp.exe' -IconFile icon.ico -version '2.0.0'"
        
        # Compile System-specific Installer (Renamed from installer.ps1 to SystemSetup.ps1)
        pwsh -Command "ps2exe -InputFile SystemSetup.ps1 -OutputFile 'Staging_System\Setup.exe' -IconFile icon.ico -version '1.0.0'"
        
        # Copy assets
        Copy-Item "SystemCleanUp\*.reg" -Destination "Staging_System\SystemCleanUp\" -ErrorAction SilentlyContinue
      shell: pwsh

    # --- SERVER CLEANUP BUILD ---
    - name: Prepare Server Staging
      run: |
        New-Item -ItemType Directory -Path "Staging_Server\ServerCleanUp" -Force
        
        # Compile Tool into the subfolder
        pwsh -Command "ps2exe -InputFile CleanUpServer.ps1 -OutputFile 'Staging_Server\ServerCleanUp\Server CleanUp.exe' -IconFile icon.ico -version '2.0.0'"
        
        # Compile Server-specific Installer (Newly added ServerSetup.ps1)
        pwsh -Command "ps2exe -InputFile ServerSetup.ps1 -OutputFile 'Staging_Server\Setup-Server.exe' -IconFile icon.ico -version '1.0.0'"
        
        # Copy assets
        Copy-Item "ServerCleanUp\*.reg" -Destination "Staging_Server\ServerCleanUp\" -ErrorAction SilentlyContinue
      shell: pwsh

    - name: Embed Admin Manifests
      run: |
        $mtPath = Get-ChildItem "C:\Program Files (x86)\Windows Kits\*\bin\*\x64\mt.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        
        # System Files
        & $mtPath -manifest elevate.manifest.xml -outputresource:"Staging_System\SystemCleanUp\System CleanUp.exe";#1
        & $mtPath -manifest elevate.manifest.xml -outputresource:"Staging_System\Setup.exe";#1
        
        # Server Files
        & $mtPath -manifest elevate.manifest.xml -outputresource:"Staging_Server\ServerCleanUp\Server CleanUp.exe";#1
        & $mtPath -manifest elevate.manifest.xml -outputresource:"Staging_Server\Setup-Server.exe";#1
      shell: pwsh

    - name: Create ZIP Archives
      run: |
        Compress-Archive -Path "Staging_System\*" -DestinationPath "SystemCleanUp.zip"
        Compress-Archive -Path "Staging_Server\*" -DestinationPath "ServerCleanUp.zip"
      shell: pwsh

    - name: Upload Artifacts
      uses: actions/upload-artifact@v6
      with:
        name: CleanUp-Executables
        path: |
          SystemCleanUp.zip
          ServerCleanUp.zip

  create_release:
    name: Create Release
    needs: build_all
    if: github.ref_type == 'tag' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v6
      with:
        name: CleanUp-Executables

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'beta-latest' }}
        files: |
          SystemCleanUp.zip
          ServerCleanUp.zip
        draft: false
        prerelease: ${{ github.ref == 'refs/heads/main' || contains(github.ref_name, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}